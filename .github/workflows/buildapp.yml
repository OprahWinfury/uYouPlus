# Original idea by @ISnackable.
# https://github.com/ISnackable/CercubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouPlus

on:
  workflow_dispatch:
    inputs:
      uyou_version:
        description: "The version of uYou"
        default: "3.0.4"
        required: true
        type: string
      uyou_url:
        description: "The URL to download uYou .deb"
        default: "https://something.url/uyou.deb"
        required: false
        type: string
      decrypted_youtube_url:
        description: "Direct URL or Google Drive share URL to the decrypted YouTube IPA."
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID. Not recommended."
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the app name shown on the Home Screen. Not recommended."
        default: "YouTube"
        required: true
        type: string
      create_release:
        description: "Create a draft release"
        default: true
        required: false
        type: boolean
      upload_artifact:
        description: "Upload artifact"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouPlus
    runs-on: macos-14

    permissions:
      contents: write

    env:
      THEOS: ${{ github.workspace }}/theos
      BUNDLE_ID: ${{ inputs.bundle_id }}
      APP_NAME: ${{ inputs.app_name }}
      UYOU_VERSION: ${{ inputs.uyou_version }}
      UYOU_URL: ${{ inputs.uyou_url }}
      YOUTUBE_URL: ${{ inputs.decrypted_youtube_url }}

    steps:
      - name: Checkout Main
        uses: actions/checkout@v4.2.1
        with:
          path: main
          submodules: recursive

      - name: Cache Homebrew dependencies
        id: brew_cache
        uses: tecolicom/actions-use-homebrew-tools@v1.2
        with:
          tools: ldid dpkg make wget
          cache: yes

      - name: Install Homebrew dependencies
        if: steps.brew_cache.outputs.cache-hit != 'true'
        run: |
          brew update
          brew install ldid dpkg make wget

      - name: Install Python download helper
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user --upgrade gdown

      - name: Set PATH environment variable
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          echo "$HOME/Library/Python/3.12/bin" >> "$GITHUB_PATH"
          echo "$HOME/Library/Python/3.11/bin" >> "$GITHUB_PATH"

      - name: Setup Theos
        uses: actions/checkout@v4.2.1
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Cache iOS 16.5 SDK
        id: sdk_cache
        uses: actions/cache@v4
        with:
          path: theos/sdks/
          key: iOS-16.5-SDK

      - name: Download iOS 16.5 SDK
        if: steps.sdk_cache.outputs.cache-hit != 'true'
        run: |
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks.git sdks
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mkdir -p "$THEOS/sdks"
          mv ./*.sdk "$THEOS/sdks/"

      - name: Setup Theos Jailed
        uses: actions/checkout@v4.2.1
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          ./theos-jailed/install

      - name: Prepare YouTube IPA
        id: prepare_youtube
        run: |
          set -euo pipefail

          if [ -z "$YOUTUBE_URL" ]; then
            echo "decrypted_youtube_url is empty."
            exit 1
          fi

          rm -f main/YouTube.ipa main/YouTube.zip
          rm -rf main/Payload

          echo "==> Downloading YouTube IPA..."

          if echo "$YOUTUBE_URL" | grep -q "drive.google.com"; then
            echo "==> Google Drive URL detected. Using gdown."
            python3 -m gdown "$YOUTUBE_URL" --fuzzy -O main/YouTube.ipa
          else
            echo "==> Direct URL detected. Using wget."
            wget "$YOUTUBE_URL" --no-verbose -O main/YouTube.ipa
          fi

          echo "==> Downloaded file info:"
          ls -lh main/YouTube.ipa
          file main/YouTube.ipa

          if ! unzip -tq main/YouTube.ipa >/dev/null 2>&1; then
            echo "Downloaded file is not a valid IPA/zip."
            echo "This usually means the URL returned an HTML page instead of the actual IPA."
            echo "Use a direct IPA URL, or a public Google Drive share link with access set to Anyone with the link."
            exit 1
          fi

          cd "${{ github.workspace }}/main"

          cp YouTube.ipa YouTube.zip
          unzip -q YouTube.zip

          if [ ! -d "Payload/YouTube.app" ]; then
            echo "Payload/YouTube.app was not found inside the IPA."
            echo "Make sure this is a decrypted YouTube IPA, not a renamed file or webpage."
            exit 1
          fi

          youtube_version="$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)"
          echo "==> YouTube v${youtube_version} downloaded."

          sed -i '' "17s#.*#YOUTUBE_VERSION = ${youtube_version}#g" Makefile

          echo "youtube_version=${youtube_version}" >> "$GITHUB_OUTPUT"

      - name: Fix compiling and build package
        id: build_package
        run: |
          set -euo pipefail

          mkdir -p "$THEOS/lib/iphone/rootless"

          cd "${{ github.workspace }}/main"

          sed -i '' "27s#.*#BUNDLE_ID = ${BUNDLE_ID}#g" Makefile
          sed -i '' "26s#.*#DISPLAY_NAME = ${APP_NAME}#g" Makefile

          make package THEOS_PACKAGE_SCHEME=rootless IPA=Payload/YouTube.app FINALPACKAGE=1

          package="$(ls -t packages/*.ipa | head -n1)"
          package_name="$(basename "$package")"

          echo "package=${package_name}" >> "$GITHUB_OUTPUT"

          echo "==> SHASUM256: $(shasum -a 256 "$package" | cut -f1 -d' ')"
          echo "==> Bundle ID: ${BUNDLE_ID}"

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4.4.3
        with:
          name: uYouPlus_${{ steps.prepare_youtube.outputs.youtube_version }}_${{ inputs.uyou_version }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create Release
        if: ${{ inputs.create_release }}
        id: create_release
        uses: qnblackcat/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.prepare_youtube.outputs.youtube_version }}-${{ inputs.uyou_version }}-${{ github.run_number }}
          name: v${{ steps.prepare_youtube.outputs.youtube_version }}-${{ inputs.uyou_version }}-${{ github.run_number }}
          files: main/packages/*.ipa
          draft: true
